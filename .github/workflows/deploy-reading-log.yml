name: Deploy Reading Log

on:
  push:
    branches: [main]
    paths:
      - 'projects/reading-log/**'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projects/reading-log/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: projects/reading-log
      - run: pnpm typecheck
        working-directory: projects/reading-log

  deploy-api:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projects/reading-log/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: projects/reading-log
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/reading-log/packages/api
          command: deploy

  deploy-web:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projects/reading-log/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: projects/reading-log
      - run: pnpm --filter @reading-log/web build
        working-directory: projects/reading-log
        env:
          VITE_API_URL: https://reading-log-api.ben-rogerson.workers.dev
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/reading-log/packages/web
          command: pages deploy dist --project-name reading-log-web
