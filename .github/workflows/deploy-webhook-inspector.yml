name: Deploy Webhook Inspector

on:
  push:
    branches: [main]
    paths:
      - 'projects/webhook-inspector/**'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projects/webhook-inspector/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: projects/webhook-inspector
      - run: pnpm typecheck
        working-directory: projects/webhook-inspector

  deploy-api:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projects/webhook-inspector/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: projects/webhook-inspector
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/webhook-inspector/packages/api
          command: deploy

  deploy-web:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projects/webhook-inspector/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: projects/webhook-inspector
      - run: pnpm --filter @webhook-inspector/web build
        working-directory: projects/webhook-inspector
        env:
          VITE_API_URL: https://webhook-inspector-api.ben-rogerson.workers.dev
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/webhook-inspector/packages/web
          command: pages deploy dist --project-name webhook-inspector-web
