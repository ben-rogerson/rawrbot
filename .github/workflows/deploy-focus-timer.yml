name: Deploy Focus Timer

on:
  push:
    branches: [main]
    paths:
      - 'projects/focus-timer/**'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projects/focus-timer/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: projects/focus-timer
      - run: pnpm typecheck
        working-directory: projects/focus-timer

  deploy-api:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projects/focus-timer/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: projects/focus-timer
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/focus-timer/packages/api
          command: deploy

  deploy-web:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: projects/focus-timer/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: projects/focus-timer
      - run: pnpm --filter @focus-timer/web build
        working-directory: projects/focus-timer
        env:
          VITE_API_URL: https://focus-timer-api.ben-rogerson.workers.dev
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/focus-timer/packages/web
          command: pages deploy dist --project-name focus-timer-web
